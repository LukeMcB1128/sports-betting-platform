name: Admin CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/admin/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/admin/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/admin

      - name: Type check
        run: npm run type-check
        working-directory: apps/admin

      - name: Build
        run: npm run build
        working-directory: apps/admin

      - name: Test
        run: npm test -- --watchAll=false
        working-directory: apps/admin

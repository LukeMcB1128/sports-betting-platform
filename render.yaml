services:
  - type: web
    name: sbp-api
    runtime: node
    buildCommand: echo "No build step"
    startCommand: node infra/dev-server.js
    envVars:
      - key: ADMIN_USERNAME
        sync: false          # set in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # set in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel URLs, e.g. https://yourapp.vercel.app,https://youradmin.vercel.app
      - key: NODE_ENV
        value: production
    disk:
      name: sbp-data
      mountPath: /opt/render/project/src/infra
      sizeGB: 1              # persists users.json and signin-log.json across deploys
